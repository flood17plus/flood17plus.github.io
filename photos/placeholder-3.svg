<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg3" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#3a0a10"/>
      <stop offset="0.6" stop-color="#1a0408"/>
      <stop offset="1" stop-color="#05020a"/>
    </radialGradient>
    <radialGradient id="sig3" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff6a4a"/>
      <stop offset="0.5" stop-color="#c43a2a"/>
      <stop offset="1" stop-color="#4a0a10"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg3)"/>
  <!-- Моранин знак / колесо смерти и перерождения -->
  <g transform="translate(100,100)" fill="none" stroke="url(#sig3)" stroke-width="2.2" stroke-linecap="round">
    <circle r="62" opacity="0.4"/>
    <circle r="46" opacity="0.6"/>
    <!-- крест в круге -->
    <path d="M -38,0 L 38,0 M 0,-38 L 0,38"/>
    <!-- диагонали -->
    <path d="M -27,-27 L 27,27 M 27,-27 L -27,27" opacity="0.75"/>
    <!-- кольцо -->
    <circle r="28"/>
    <!-- полумесяцы по осям (символы луны) -->
    <path d="M -46,0 Q -40,-8 -34,0 Q -40,8 -46,0" fill="url(#sig3)" stroke="none" opacity="0.9"/>
    <path d="M  46,0 Q  40,-8  34,0 Q  40,8  46,0" fill="url(#sig3)" stroke="none" opacity="0.9"/>
    <path d="M 0,-46 Q 8,-40 0,-34 Q -8,-40 0,-46" fill="url(#sig3)" stroke="none" opacity="0.9"/>
    <path d="M 0, 46 Q 8, 40 0, 34 Q -8, 40 0, 46" fill="url(#sig3)" stroke="none" opacity="0.9"/>
    <!-- центр -->
    <circle r="5" fill="url(#sig3)" stroke="none"/>
  </g>
  <!-- Руны -->
  <g fill="#9a3a22" font-family="Georgia, serif" font-size="12" text-anchor="middle" opacity="0.85">
    <text x="100" y="22">ᛗ</text>
    <text x="178" y="105">ᛈ</text>
    <text x="100" y="188">ᛏ</text>
    <text x="22" y="105">ᛁ</text>
  </g>
</svg>
